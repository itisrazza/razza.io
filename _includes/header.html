<header>
  <div class="header-page-meta">
    <h1>{{ page.title }}</h1>
    {%- if page.subtitle -%}
      <div>{{ page.subtitle }}</div>
    {%- endif -%}
  </div>

  {% if page.links %}
    <ul class="header-buttons">
      {% for link in page.links %}
        <li>
          <a href="{{ link.url }}" class="button">{{ link.label }}</a>
        </li>
      {% endfor %}
    </ul>
  {% endif %}
</header>
