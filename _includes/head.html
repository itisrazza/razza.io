<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {%- seo -%}

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16x16.png' | relative_url }}">
    <link rel="manifest" href="{{ '/assets/favicon/site.webmanifest' | relative_url }}">
    {%- feed_meta -%}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..1000,0..1,0..1,0..1&display=swap"
        rel="stylesheet">
<script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

    {%- for bundle in page.bundles -%}
    <script src="{{ '/assets/js/' | append: bundle | append: '.js' | relative_url }}" defer></script>
    {%- endfor -%}
    {%- for bundle in layout.bundles -%}
    <script src="{{ '/assets/js/' | append: bundle | append: '.js' | relative_url }}" defer></script>
    {%- endfor -%}

    {%- if page.extra_head -%}{{ page.extra_head }}{%- endif -%}
    {%- if layout.extra_head -%}{{ layout.extra_head }}{%- endif -%}
</head>
