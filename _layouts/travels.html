---
layout: chrome
nav_tag: travels

extra_head: |
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
---

<header>
  <h1>Travels</h1>
</header>

<div id="map"></div>

{% assign travels = site.travels | reverse %}

<main class="note-list">
  {% for travel in travels %}
    {% include travel-tile.html %}
  {% endfor %}
</main>

<script defer>
  (function () {
    const map = L.map('map').setView([0, 174.783333], 1);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    const addMarker = (name, link, lat, lon) => {
      const marker = L.marker([lat, lon]).addTo(map);
      const popup = L.popup().setContent(`<a href="${link}">${name}</a>`);
      marker.bindPopup(popup);
    };

    {% for travel in travels %}
      addMarker("{{ travel.title }}{% if travel.alt_title %} ({{ travel.alt_title }}){% endif %}", "{{ travel.url }}", {{ travel.location.lat }}, {{ travel.location.lon }})
    {% endfor %}
  })();
</script>
