---
layout: chrome
nav_tag: notes
---

{% assign date = page.date | date: '%F' %}

<header>
    <h1>{{ page.title }}</h1>
    <p>{{ page.date | date: "%B %e, %Y" }}</p>
    {% if page.resources %}
    <div class="post-resources">
      {% for resource in page.resources %}
      <a class="post-resource" href="{{ resource.url }}"{% if resource.url contains '://' %} target="_blank" rel="noopener noreferrer"{% endif %}>
        <i class="bi bi-{{ resource.icon | default: "file-earmark" }}"></i>{{ resource.label }}
      </a>
      {% endfor %}
    </div>
    {% endif %}
</header>

<main class="chrome-inset">
    <article>
        {{ content }}
    </article>
</main>
